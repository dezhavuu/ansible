[defaults]
# Disables SSH host key checking — Ansible will not prompt "Are you sure you want to continue connecting (yes/no)?"
# when connecting to a server for the first time.
host_key_checking = False
# Suppresses warnings like "Consider using the file module with state=directory rather than running mkdir".
# Ansible prefers its own modules, but shell tasks are often more practical for DBA work — the warnings are just noise.
command_warnings = False

[privilege_escalation]
# Ansible automatically runs tasks with elevated privileges (like sudo).
# Without this, you would need to add become: yes to every playbook or pass --become on the command line.
become = True
# Use sudo for privilege escalation. Alternatives are su, pbrun, doas, etc.
become_method = sudo
