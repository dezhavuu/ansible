---
# =============================================================================
# Oracle 19c  Create Primary Database + Data Guard Preparation
# Variables from group_vars/all.yml: oracle_user
# Variables from inventory: oracle_base, oracle_home, grid_home,
#   oracle_sid, db_unique_name_pri/stby, pdb_name, sys_password, system_password
# =============================================================================

# =========================================================================
# PLAY 1: CREATE DATABASE + DG PREP (PRIMARY ONLY)
# =========================================================================
- name: Oracle 19c Create Primary Database
  hosts: primary
  become: yes
  vars:
    db_charset: AL32UTF8
    primary_host: dghost-001
    standby_host: dghost-002
    sga_target: 4G
    pga_target: 1G

  tasks:
    # =========================================================================
    # PHASE 1: CREATE DATABASE VIA DBCA
    # =========================================================================
    - name: "DBCA | Check if database already exists"
      shell: "ps -ef | grep pmon_{{ oracle_sid }} | grep -v grep || true"
      register: db_running
      changed_when: false

    - name: "DBCA | Create CDB + PDB (takes ~10-20 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_BASE={{ oracle_base }}
        {{ oracle_home }}/bin/dbca -silent -createDatabase \
          -templateName General_Purpose.dbc \
          -gdbName {{ db_unique_name_pri }} \
          -sid {{ oracle_sid }} \
          -createAsContainerDatabase true \
          -numberOfPDBs 1 \
          -pdbName {{ pdb_name }} \
          -pdbAdminPassword {{ sys_password }} \
          -sysPassword {{ sys_password }} \
          -systemPassword {{ system_password }} \
          -characterSet {{ db_charset }} \
          -nationalCharacterSet AL16UTF16 \
          -memoryMgmtType AUTO_SGA \
          -totalMemory 5120 \
          -databaseType MULTIPURPOSE \
          -storageType ASM \
          -datafileDestination +DATA \
          -recoveryAreaDestination +FRA \
          -recoveryAreaSize 100000 \
          -redoLogFileSize 100 \
          -emConfiguration NONE \
          -ignorePreReqs \
          -initParams \
            db_unique_name={{ db_unique_name_pri }},\
            db_create_file_dest=+DATA,\
            db_recovery_file_dest=+FRA,\
            db_recovery_file_dest_size=98G,\
            sga_target={{ sga_target }},\
            pga_aggregate_target={{ pga_target }},\
            log_archive_format='%t_%s_%r.arc',\
            remote_login_passwordfile=EXCLUSIVE \
          2>&1 | tee /tmp/dbca_create.log
      become_user: "{{ oracle_user }}"
      register: dbca_output
      when: "'pmon_' + oracle_sid not in db_running.stdout"

    - name: "DBCA | Show DBCA output"
      debug:
        msg: "{{ dbca_output.stdout_lines }}"
      when: dbca_output.stdout_lines is defined

    # =========================================================================
    # PHASE 2: REGISTER DB WITH ORACLE RESTART
    # =========================================================================
    - name: "SRVCTL | Check if DB is registered"
      shell: "{{ grid_home }}/bin/srvctl status database -d {{ db_unique_name_pri }} || true"
      become_user: "{{ oracle_user }}"
      environment:
        ORACLE_HOME: "{{ grid_home }}"
      register: srvctl_check
      changed_when: false

    - name: "SRVCTL | Register database with Oracle Restart"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/srvctl add database \
          -db {{ db_unique_name_pri }} \
          -oraclehome {{ oracle_home }} \
          -instance {{ oracle_sid }} \
          -startoption OPEN \
          -policy AUTOMATIC
      become_user: "{{ oracle_user }}"
      when: "'does not exist' in srvctl_check.stdout or 'PRCD-1120' in srvctl_check.stderr | default('')"

    # =========================================================================
    # PHASE 3: DATA GUARD PREPARATION
    # =========================================================================
    - name: "DG-PREP | Enable archivelog + force logging + standby parameters"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE FORCE LOGGING;
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        ALTER SYSTEM SET log_archive_config='DG_CONFIG=({{ db_unique_name_pri }},{{ db_unique_name_stby }})' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_1='LOCATION=USE_DB_RECOVERY_FILE_DEST VALID_FOR=(ALL_LOGFILES,ALL_ROLES) DB_UNIQUE_NAME={{ db_unique_name_pri }}' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_2='SERVICE={{ db_unique_name_stby }} ASYNC VALID_FOR=(ONLINE_LOGFILES,PRIMARY_ROLE) DB_UNIQUE_NAME={{ db_unique_name_stby }}' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_state_2=DEFER SCOPE=BOTH;
        ALTER SYSTEM SET fal_server='{{ db_unique_name_stby }}' SCOPE=BOTH;
        ALTER SYSTEM SET standby_file_management=AUTO SCOPE=BOTH;
        ALTER SYSTEM SET dg_broker_start=TRUE SCOPE=BOTH;
        ALTER PLUGGABLE DATABASE ALL OPEN;
        ALTER PLUGGABLE DATABASE ALL SAVE STATE;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: dg_prep
      when: "'pmon_' + oracle_sid not in db_running.stdout"

    - name: "DG-PREP | Check if already in archivelog mode"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF
        SELECT LOG_MODE FROM V\$DATABASE;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: archivelog_check
      changed_when: false
      when: "'pmon_' + oracle_sid in db_running.stdout"

    - name: "DG-PREP | Enable Data Guard parameters on existing database"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE FORCE LOGGING;
        ALTER SYSTEM SET log_archive_config='DG_CONFIG=({{ db_unique_name_pri }},{{ db_unique_name_stby }})' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_1='LOCATION=USE_DB_RECOVERY_FILE_DEST VALID_FOR=(ALL_LOGFILES,ALL_ROLES) DB_UNIQUE_NAME={{ db_unique_name_pri }}' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_2='SERVICE={{ db_unique_name_stby }} ASYNC VALID_FOR=(ONLINE_LOGFILES,PRIMARY_ROLE) DB_UNIQUE_NAME={{ db_unique_name_stby }}' SCOPE=BOTH;
        ALTER SYSTEM SET log_archive_dest_state_2=DEFER SCOPE=BOTH;
        ALTER SYSTEM SET fal_server='{{ db_unique_name_stby }}' SCOPE=BOTH;
        ALTER SYSTEM SET standby_file_management=AUTO SCOPE=BOTH;
        ALTER SYSTEM SET dg_broker_start=TRUE SCOPE=BOTH;
        EOSQL
      become_user: "{{ oracle_user }}"
      when: "'pmon_' + oracle_sid in db_running.stdout and 'ARCHIVELOG' in archivelog_check.stdout | default('')"

    # =========================================================================
    # PHASE 4: CREATE STANDBY REDO LOGS
    # =========================================================================
    - name: "SRL | Check if standby redo logs exist"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF
        SELECT COUNT(*) FROM V\$LOGFILE WHERE TYPE='STANDBY';
        EOSQL
      become_user: "{{ oracle_user }}"
      register: srl_check
      changed_when: false

    - name: "SRL | Create standby redo logs (online redo groups + 1)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 SIZE 100M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 SIZE 100M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 SIZE 100M;
        ALTER DATABASE ADD STANDBY LOGFILE THREAD 1 SIZE 100M;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: srl_create
      when: srl_check.stdout | trim == '0'

    - name: "SRL | Show standby redo log creation"
      debug:
        msg: "{{ srl_create.stdout_lines }}"
      when: srl_create.stdout_lines is defined

    # =========================================================================
    # PHASE 5: CONFIGURE TNS FOR DATA GUARD (BOTH SERVERS)
    # =========================================================================
- name: Configure TNS on both servers
  hosts: oracle_servers
  become: yes
  vars:
    primary_host: dghost-001
    standby_host: dghost-002

  tasks:
    - name: "TNS | Create tnsnames.ora"
      copy:
        dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0644'
        content: |
          {{ db_unique_name_pri }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ primary_host }})(PORT = 1521))
              (CONNECT_DATA =
                (SERVER = DEDICATED)
                (SERVICE_NAME = {{ db_unique_name_pri }})
              )
            )

          {{ db_unique_name_stby }} =
            (DESCRIPTION =
              (ADDRESS = (PROTOCOL = TCP)(HOST = {{ standby_host }})(PORT = 1521))
              (CONNECT_DATA =
                (SERVER = DEDICATED)
                (SERVICE_NAME = {{ db_unique_name_stby }})
              )
            )

    - name: "TNS | Create static listener entry in listener.ora"
      copy:
        dest: "{{ grid_home }}/network/admin/listener.ora"
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0644'
        content: |
          LISTENER =
            (DESCRIPTION_LIST =
              (DESCRIPTION =
                (ADDRESS = (PROTOCOL = TCP)(HOST = {{ ansible_hostname }})(PORT = 1521))
              )
            )

          SID_LIST_LISTENER =
            (SID_LIST =
              (SID_DESC =
                (GLOBAL_DBNAME = {{ db_unique_name_pri if inventory_hostname in groups['primary'] else db_unique_name_stby }})
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
              (SID_DESC =
                (GLOBAL_DBNAME = {{ db_unique_name_pri if inventory_hostname in groups['primary'] else db_unique_name_stby }}_DGMGRL)
                (ORACLE_HOME = {{ oracle_home }})
                (SID_NAME = {{ oracle_sid }})
              )
            )

    - name: "TNS | Reload listener"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/lsnrctl reload
      become_user: "{{ oracle_user }}"

    - name: "TNS | Show listener status"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/lsnrctl status
      become_user: "{{ oracle_user }}"
      register: lsnr_status
      changed_when: false

    - name: "TNS | Show listener output"
      debug:
        msg: "{{ lsnr_status.stdout_lines }}"

    # =========================================================================
    # PHASE 6: COPY PASSWORD FILE TO STANDBY
    # =========================================================================
- name: Copy password file to standby
  hosts: primary
  become: yes

  tasks:
    - name: "PWFILE | Read password file from primary"
      slurp:
        src: "{{ oracle_home }}/dbs/orapw{{ oracle_sid }}"
      register: pw_file

- name: Deploy password file to standby
  hosts: standby
  become: yes

  tasks:
    - name: "PWFILE | Write password file to standby"
      copy:
        content: "{{ hostvars[groups['primary'][0]]['pw_file']['content'] | b64decode }}"
        dest: "{{ oracle_home }}/dbs/orapw{{ oracle_sid }}"
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0640'

    # =========================================================================
    # PHASE 7: VALIDATION
    # =========================================================================
- name: Validate primary database
  hosts: primary
  become: yes

  tasks:
    - name: "VALIDATE | Check database status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET LINESIZE 120
        COL name FORMAT A15
        COL db_unique_name FORMAT A15
        COL open_mode FORMAT A15
        COL log_mode FORMAT A12
        COL force_logging FORMAT A5
        COL database_role FORMAT A10
        SELECT name, db_unique_name, open_mode, log_mode, force_logging, database_role FROM v\$database;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: db_status
      changed_when: false

    - name: "VALIDATE | Check PDB status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET LINESIZE 100
        COL name FORMAT A20
        COL open_mode FORMAT A15
        SELECT con_id, name, open_mode FROM v\$pdbs;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: pdb_status
      changed_when: false

    - name: "VALIDATE | Check standby redo logs"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET LINESIZE 100
        SELECT group#, type, bytes/1024/1024 size_mb FROM v\$log ORDER BY group#;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: logfile_status
      changed_when: false

    - name: "VALIDATE | Check Data Guard parameters"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET LINESIZE 120
        COL name FORMAT A35
        COL value FORMAT A80
        SELECT name, value FROM v\$parameter
        WHERE name IN (
          'log_archive_config','log_archive_dest_1','log_archive_dest_2',
          'log_archive_dest_state_2','fal_server','standby_file_management',
          'dg_broker_start','db_unique_name','remote_login_passwordfile'
        )
        ORDER BY name;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: dg_params
      changed_when: false

    - name: "VALIDATE | Show results"
      debug:
        msg:
          - "=== Database Status ==="
          - "{{ db_status.stdout_lines }}"
          - "=== PDB Status ==="
          - "{{ pdb_status.stdout_lines }}"
          - "=== Redo Logs ==="
          - "{{ logfile_status.stdout_lines }}"
          - "=== Data Guard Parameters ==="
          - "{{ dg_params.stdout_lines }}"

