---
# =============================================================================
# Oracle 19c — Data Guard Zero Downtime Patch ROLLBACK
# Reihenfolge: Standby rollback → Switchover → Primary rollback → Switchback
#              → Datapatch rollback → Cleanup + Validierung
# DB ist IMMER online — kein Downtime!
# Funktioniert auch für Standalone (Switchover-Steps werden übersprungen)
#
# Rollback-Reihenfolge pro Server: OJVM → DB → GI (umgekehrt wie Apply)
# opatch rollback:     braucht KEINE Patch-Dateien (nutzt OPatch Inventory)
# opatchauto rollback: braucht das GI Patch-Verzeichnis (wird in Play 1 gestaged)
#
# Dynamische Rollenerkennung: Playbook erkennt selbst welcher Host Primary/
# Standby ist — unabhängig vom Inventory. Funktioniert auch nach manuellem
# Switchover.
#
# Variables from inventory: oracle_home, grid_home, oracle_base, oracle_sid,
#   oracle_user, db_unique_name_pri/stby, patch_stage, patch_dir,
#   gi_patch_number, gi_patch_zip, db_patch_number, ojvm_patch_number
# Variables from vault: sys_password
# =============================================================================

# =========================================================================
# PLAY 0: DETECT CURRENT DG ROLES DYNAMICALLY
# =========================================================================
- name: "ROLLBACK STEP 0: Detect current Primary and Standby"
  hosts: oracle_servers
  become: yes

  tasks:
    - name: "DETECT | Get current database role"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT database_role FROM v\$database;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: db_role
      changed_when: false
      ignore_errors: yes

    - name: "DETECT | Add to dyn_primary group"
      add_host:
        name: "{{ inventory_hostname }}"
        groups: dyn_primary
      when: "'PRIMARY' in db_role.stdout | default('')"

    - name: "DETECT | Add to dyn_standby group"
      add_host:
        name: "{{ inventory_hostname }}"
        groups: dyn_standby
      when: "'PHYSICAL STANDBY' in db_role.stdout | default('')"

    - name: "DETECT | Show detected roles"
      debug:
        msg: "{{ inventory_hostname }}: {{ db_role.stdout | trim | default('UNKNOWN / DB not running') }}"

# =========================================================================
# PLAY 1: STAGE GI PATCH (für opatchauto rollback benötigt)
# =========================================================================
- name: "ROLLBACK STEP 1: Stage GI patch for opatchauto rollback"
  hosts: oracle_servers
  become: yes

  tasks:
    - name: "STAGE | Create patch staging directory"
      file:
        path: "{{ patch_stage }}"
        state: directory
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0755'

    - name: "STAGE | Check if GI patch already staged"
      stat:
        path: "{{ patch_stage }}/{{ gi_patch_number }}"
      register: gi_staged

    - name: "STAGE | Copy GI RU patch"
      copy:
        src: "{{ patch_dir }}/{{ gi_patch_zip }}"
        dest: "{{ patch_stage }}/{{ gi_patch_zip }}"
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0644'
      when: not gi_staged.stat.exists

    - name: "STAGE | Unzip GI RU patch"
      shell: |
        cd {{ patch_stage }}
        unzip -oq {{ gi_patch_zip }}
      become_user: "{{ oracle_user }}"
      when: not gi_staged.stat.exists

    - name: "STAGE | Delete GI ZIP to free space"
      file:
        path: "{{ patch_stage }}/{{ gi_patch_zip }}"
        state: absent
      when: not gi_staged.stat.exists

# =========================================================================
# PLAY 2: ROLLBACK STANDBY — Primary bleibt online
# =========================================================================
- name: "ROLLBACK STEP 2: Rollback Standby — Primary stays online"
  hosts: dyn_standby
  become: yes

  tasks:
    - name: "STBY-CHECK | Check current DB patch level"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch lspatches 2>/dev/null
      become_user: "{{ oracle_user }}"
      register: current_patches
      changed_when: false

    - name: "STBY-CHECK | Show current patches"
      debug:
        msg: "{{ current_patches.stdout_lines }}"

    - name: "STBY-CHECK | Skip if no patches to rollback"
      meta: end_host
      when:
        - db_patch_number | string not in current_patches.stdout
        - ojvm_patch_number | string not in current_patches.stdout

    # -------------------------------------------------------------------------
    # MRP stoppen + DB herunterfahren
    # -------------------------------------------------------------------------
    - name: "STBY-PREP | Cancel MRP + Shutdown DB"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE CANCEL;
        SHUTDOWN IMMEDIATE;
        EOSQL
      become_user: "{{ oracle_user }}"
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # OJVM Rollback
    # -------------------------------------------------------------------------
    - name: "STBY-OJVM | Rollback OJVM patch"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback \
          -id {{ ojvm_patch_number }} -silent \
          2>&1 | tee /tmp/ojvm_rollback_stby.log
      become_user: "{{ oracle_user }}"
      register: ojvm_rollback_stby
      when: ojvm_patch_number | string in current_patches.stdout

    - name: "STBY-OJVM | Show result"
      debug:
        msg: "{{ ojvm_rollback_stby.stdout_lines[-10:] }}"
      when: ojvm_rollback_stby.stdout_lines is defined

    # -------------------------------------------------------------------------
    # DB Rollback
    # -------------------------------------------------------------------------
    - name: "STBY-DB | Rollback DB RU patch"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback \
          -id {{ db_patch_number }} -silent \
          2>&1 | tee /tmp/db_rollback_stby.log
      become_user: "{{ oracle_user }}"
      register: db_rollback_stby
      when: db_patch_number | string in current_patches.stdout

    - name: "STBY-DB | Show result"
      debug:
        msg: "{{ db_rollback_stby.stdout_lines[-10:] }}"
      when: db_rollback_stby.stdout_lines is defined

    # -------------------------------------------------------------------------
    # GI Rollback
    # -------------------------------------------------------------------------
    - name: "STBY-GI | Check current GI patch level"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/OPatch/opatch lspatches 2>/dev/null
      become_user: "{{ oracle_user }}"
      register: gi_patches_stby
      changed_when: false

    - name: "STBY-GI | Kill oracle processes before opatchauto"
      shell: pkill -9 -u oracle || true

    - name: "STBY-GI | Rollback GI RU via opatchauto"
      shell: |
        {{ grid_home }}/OPatch/opatchauto rollback \
          -oh {{ grid_home }} \
          -patch_path {{ patch_stage }}/{{ gi_patch_number }} \
          2>&1 | tee /tmp/gi_rollback_stby.log
      register: gi_rollback_stby
      when: gi_patch_number | string in gi_patches_stby.stdout

    - name: "STBY-GI | Show result (last 15 lines)"
      debug:
        msg: "{{ gi_rollback_stby.stdout_lines[-15:] }}"
      when: gi_rollback_stby.stdout_lines is defined

    # -------------------------------------------------------------------------
    # Standby neu starten + MRP — robust gegen alle Startzustände
    # -------------------------------------------------------------------------
    - name: "STBY-POST | Get instance status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT status FROM v\$instance;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: inst_stat_stby
      changed_when: false
      ignore_errors: yes

    - name: "STBY-POST | Startup MOUNT (DB is shutdown)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        STARTUP MOUNT;
        EOSQL
      become_user: "{{ oracle_user }}"
      when: inst_stat_stby.rc != 0 or inst_stat_stby.stdout | trim == ''

    - name: "STBY-POST | ALTER DATABASE MOUNT (DB is in NOMOUNT)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE MOUNT;
        EOSQL
      become_user: "{{ oracle_user }}"
      when:
        - inst_stat_stby.rc == 0
        - "'STARTED' in inst_stat_stby.stdout"

    - name: "STBY-POST | Start MRP"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE DISCONNECT FROM SESSION;
        EOSQL
      become_user: "{{ oracle_user }}"

    - name: "STBY-POST | Verify MRP running"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT process||' '||status FROM v\$managed_standby WHERE process='MRP0';
        EOSQL
      become_user: "{{ oracle_user }}"
      register: mrp_check
      changed_when: false

    - name: "STBY-POST | Show MRP status"
      debug:
        msg: "{{ mrp_check.stdout | trim }}"

    - name: "STBY-POST | Fail if MRP not running"
      fail:
        msg: "MRP0 läuft nicht auf {{ inventory_hostname }} — Switchover nicht sicher"
      when: "'APPLYING_LOG' not in mrp_check.stdout"

# =========================================================================
# PLAY 3: SWITCHOVER → aktueller Standby wird Primary
# =========================================================================
- name: "ROLLBACK STEP 3: Switchover to standby"
  hosts: dyn_primary
  become: yes

  tasks:
    - name: "SWITCH | Check DG Broker status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl / <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: dg_config
      changed_when: false
      ignore_errors: yes

    - name: "SWITCH | Skip — no Data Guard"
      meta: end_host
      when: "'SUCCESS' not in dg_config.stdout | default('')"

    - name: "SWITCH | Wait for apply lag = 0 (max 10 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        for i in $(seq 1 20); do
          LAG=$({{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT value FROM v\$dataguard_stats WHERE name='apply lag';
        EOSQL
        )
          echo "Apply lag: $LAG"
          if echo "$LAG" | grep -qE "\+00 00:00:0[0-9]"; then
            echo "LAG_OK"
            break
          fi
          sleep 30
        done
      become_user: "{{ oracle_user }}"
      register: lag_check
      failed_when: "'LAG_OK' not in lag_check.stdout"

    - name: "SWITCH | Perform switchover"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl / <<EODG
        SWITCHOVER TO '{{ db_unique_name_stby }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchover_result

    - name: "SWITCH | Show switchover result"
      debug:
        msg: "{{ switchover_result.stdout_lines }}"

    - name: "SWITCH | Verify config after switchover"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: config_after_switch
      changed_when: false

    - name: "SWITCH | Fail if config not SUCCESS"
      fail:
        msg: "Switchover fehlgeschlagen — DG Config nicht SUCCESS"
      when: "'SUCCESS' not in config_after_switch.stdout | default('')"

# =========================================================================
# PLAY 4: ROLLBACK OLD PRIMARY (jetzt Standby)
# =========================================================================
- name: "ROLLBACK STEP 4: Rollback old primary"
  hosts: dyn_primary
  become: yes

  tasks:
    - name: "PRI-CHECK | Check current DB patch level"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch lspatches 2>/dev/null
      become_user: "{{ oracle_user }}"
      register: current_patches_pri
      changed_when: false

    - name: "PRI-CHECK | Show current patches"
      debug:
        msg: "{{ current_patches_pri.stdout_lines }}"

    - name: "PRI-CHECK | Skip if no patches to rollback"
      meta: end_host
      when:
        - db_patch_number | string not in current_patches_pri.stdout
        - ojvm_patch_number | string not in current_patches_pri.stdout

    - name: "PRI-PREP | Cancel MRP + Shutdown DB"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE CANCEL;
        SHUTDOWN IMMEDIATE;
        EOSQL
      become_user: "{{ oracle_user }}"
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # OJVM Rollback
    # -------------------------------------------------------------------------
    - name: "PRI-OJVM | Rollback OJVM patch"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback \
          -id {{ ojvm_patch_number }} -silent \
          2>&1 | tee /tmp/ojvm_rollback_pri.log
      become_user: "{{ oracle_user }}"
      register: ojvm_rollback_pri
      when: ojvm_patch_number | string in current_patches_pri.stdout

    - name: "PRI-OJVM | Show result"
      debug:
        msg: "{{ ojvm_rollback_pri.stdout_lines[-10:] }}"
      when: ojvm_rollback_pri.stdout_lines is defined

    # -------------------------------------------------------------------------
    # DB Rollback
    # -------------------------------------------------------------------------
    - name: "PRI-DB | Rollback DB RU patch"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback \
          -id {{ db_patch_number }} -silent \
          2>&1 | tee /tmp/db_rollback_pri.log
      become_user: "{{ oracle_user }}"
      register: db_rollback_pri
      when: db_patch_number | string in current_patches_pri.stdout

    - name: "PRI-DB | Show result"
      debug:
        msg: "{{ db_rollback_pri.stdout_lines[-10:] }}"
      when: db_rollback_pri.stdout_lines is defined

    # -------------------------------------------------------------------------
    # GI Rollback
    # -------------------------------------------------------------------------
    - name: "PRI-GI | Check current GI patch level"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/OPatch/opatch lspatches 2>/dev/null
      become_user: "{{ oracle_user }}"
      register: gi_patches_pri
      changed_when: false

    - name: "PRI-GI | Kill oracle processes before opatchauto"
      shell: pkill -9 -u oracle || true

    - name: "PRI-GI | Rollback GI RU via opatchauto"
      shell: |
        {{ grid_home }}/OPatch/opatchauto rollback \
          -oh {{ grid_home }} \
          -patch_path {{ patch_stage }}/{{ gi_patch_number }} \
          2>&1 | tee /tmp/gi_rollback_pri.log
      register: gi_rollback_pri
      when: gi_patch_number | string in gi_patches_pri.stdout

    - name: "PRI-GI | Show result (last 15 lines)"
      debug:
        msg: "{{ gi_rollback_pri.stdout_lines[-15:] }}"
      when: gi_rollback_pri.stdout_lines is defined

    # -------------------------------------------------------------------------
    # Als Standby starten + MRP — robust gegen alle Startzustände
    # -------------------------------------------------------------------------
    - name: "PRI-POST | Get instance status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT status FROM v\$instance;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: inst_stat_pri
      changed_when: false
      ignore_errors: yes

    - name: "PRI-POST | Startup MOUNT (DB is shutdown)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        STARTUP MOUNT;
        EOSQL
      become_user: "{{ oracle_user }}"
      when: inst_stat_pri.rc != 0 or inst_stat_pri.stdout | trim == ''

    - name: "PRI-POST | ALTER DATABASE MOUNT (DB is in NOMOUNT)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE MOUNT;
        EOSQL
      become_user: "{{ oracle_user }}"
      when:
        - inst_stat_pri.rc == 0
        - "'STARTED' in inst_stat_pri.stdout"

    - name: "PRI-POST | Start MRP"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE DISCONNECT FROM SESSION;
        EOSQL
      become_user: "{{ oracle_user }}"

    - name: "PRI-POST | Verify MRP running"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT process||' '||status FROM v\$managed_standby WHERE process='MRP0';
        EOSQL
      become_user: "{{ oracle_user }}"
      register: mrp_check_pri
      changed_when: false

    - name: "PRI-POST | Show MRP status"
      debug:
        msg: "{{ mrp_check_pri.stdout | trim }}"

    - name: "PRI-POST | Fail if MRP not running"
      fail:
        msg: "MRP0 läuft nicht auf {{ inventory_hostname }} — Switchback nicht sicher"
      when: "'APPLYING_LOG' not in mrp_check_pri.stdout"

# =========================================================================
# PLAY 5: SWITCHBACK → Original-Rollen
# =========================================================================
- name: "ROLLBACK STEP 5: Switchback to original roles"
  hosts: dyn_standby
  become: yes

  tasks:
    - name: "SWITCHBACK | Check DG config"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl / <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: dg_config_back
      changed_when: false
      ignore_errors: yes

    - name: "SWITCHBACK | Skip — no Data Guard"
      meta: end_host
      when: "'SUCCESS' not in dg_config_back.stdout | default('')"

    - name: "SWITCHBACK | Wait for apply lag = 0 (max 10 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        for i in $(seq 1 20); do
          LAG=$({{ oracle_home }}/bin/dgmgrl / <<EODG
        SHOW DATABASE VERBOSE '{{ db_unique_name_pri }}';
        EXIT;
        EODG
        )
          if echo "$LAG" | grep -qE "Apply Lag.*\+00 00:00:0[0-9]"; then
            echo "LAG_OK"
            break
          fi
          sleep 30
        done
      become_user: "{{ oracle_user }}"
      register: lag_check_back
      failed_when: "'LAG_OK' not in lag_check_back.stdout"

    - name: "SWITCHBACK | Switchback to original primary"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl / <<EODG
        SWITCHOVER TO '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchback_result

    - name: "SWITCHBACK | Show result"
      debug:
        msg: "{{ switchback_result.stdout_lines }}"

    - name: "SWITCHBACK | Verify final configuration"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: final_config
      changed_when: false

    - name: "SWITCHBACK | Fail if config not SUCCESS"
      fail:
        msg: "Switchback fehlgeschlagen — DG Config nicht SUCCESS"
      when: "'SUCCESS' not in final_config.stdout | default('')"

# =========================================================================
# PLAY 6: DATAPATCH ROLLBACK
# =========================================================================
- name: "ROLLBACK STEP 6: Datapatch rollback"
  hosts: dyn_primary
  become: yes

  tasks:
    - name: "DATAPATCH | Run datapatch (auto-detects rollback)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/OPatch/datapatch -verbose \
          2>&1 | tee /tmp/datapatch_rollback.log
      become_user: "{{ oracle_user }}"
      register: datapatch_result

    - name: "DATAPATCH | Show result (last 20 lines)"
      debug:
        msg: "{{ datapatch_result.stdout_lines[-20:] }}"

# =========================================================================
# PLAY 7: CLEANUP + VALIDIERUNG
# =========================================================================
- name: "ROLLBACK STEP 7: Cleanup and validate"
  hosts: oracle_servers
  become: yes

  tasks:
    - name: "CLEANUP | Remove staged patches"
      file:
        path: "{{ patch_stage }}"
        state: absent

    - name: "VALIDATE | DB version"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF PAGES 0
        SELECT version_full FROM v\$instance;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: db_version
      changed_when: false

    - name: "VALIDATE | DB patches"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch lspatches
      become_user: "{{ oracle_user }}"
      register: db_patches
      changed_when: false

    - name: "VALIDATE | GI patches"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/OPatch/opatch lspatches
      become_user: "{{ oracle_user }}"
      register: gi_patches
      changed_when: false

    - name: "VALIDATE | Show results"
      debug:
        msg:
          - "=== DB Version ({{ inventory_hostname }}) ==="
          - "{{ db_version.stdout | trim }}"
          - "=== DB Patches ==="
          - "{{ db_patches.stdout_lines }}"
          - "=== GI Patches ==="
          - "{{ gi_patches.stdout_lines }}"
