---
# =============================================================================
# Oracle 19c — Data Guard Zero Downtime Patch ROLLBACK
# Order: Rollback Standby → Switchover → Rollback old Primary → Switchback
# DB is ALWAYS online — no downtime!
# Works for: Data Guard AND Standalone
#
# IMPORTANT: Patches must still be staged in patch_stage!
#   If already cleaned up, run patch_dg_step1_prepare.yml first
#   (only OPatch is needed, not the patches themselves — opatch rollback
#   uses the inventory, not the patch files)
#
# For GI rollback, the original GI patch must be available in patch_stage
#   because opatchauto rollback needs the patch directory
#
# Variables from inventory: oracle_user, oracle_home, grid_home, oracle_sid,
#   db_unique_name_pri, db_unique_name_stby, sys_password,
#   patch_dir, patch_stage, gi_patch_zip, gi_patch_number,
#   db_patch_number, ojvm_patch_number
# =============================================================================

# =========================================================================
# PLAY 1: STAGE GI PATCH (needed for opatchauto rollback)
# =========================================================================
- name: "ROLLBACK STEP 1: Stage GI patch for opatchauto rollback"
  hosts: oracle_servers
  become: yes

  tasks:
    - name: "STAGE | Create patch staging directory"
      file:
        path: "{{ patch_stage }}"
        state: directory
        owner: "{{ oracle_user }}"
        group: oinstall
        mode: '0755'

    - name: "STAGE | Check if GI patch already staged"
      stat:
        path: "{{ patch_stage }}/{{ gi_patch_number }}"
      register: gi_staged

    - name: "STAGE | Copy GI RU patch (needed for opatchauto rollback)"
      copy:
        src: "{{ patch_dir }}/{{ gi_patch_zip }}"
        dest: "{{ patch_stage }}/"
        owner: "{{ oracle_user }}"
        group: oinstall
      when: not gi_staged.stat.exists

    - name: "STAGE | Unzip GI RU patch"
      shell: "cd {{ patch_stage }} && unzip -oq {{ gi_patch_zip }}"
      become_user: "{{ oracle_user }}"
      when: not gi_staged.stat.exists

    - name: "STAGE | Delete GI ZIP to free space"
      file:
        path: "{{ patch_stage }}/{{ gi_patch_zip }}"
        state: absent

# =========================================================================
# PLAY 2: ROLLBACK STANDBY (PRIMARY STAYS ONLINE)
# =========================================================================
- name: "ROLLBACK STEP 2: Rollback Standby — Primary stays online"
  hosts: standby
  become: yes

  tasks:
    # --- Check if patches are applied ---
    - name: "STBY-CHECK | Check current patch level"
      shell: "{{ oracle_home }}/OPatch/opatch lspatches"
      become_user: "{{ oracle_user }}"
      register: current_patches
      changed_when: false

    - name: "STBY-CHECK | Show current patches"
      debug:
        msg: "{{ current_patches.stdout_lines }}"

    - name: "STBY-CHECK | Skip rollback if patches not applied"
      set_fact:
        needs_rollback: "{{ db_patch_number in current_patches.stdout }}"

    # --- STOP MRP + DB ---
    - name: "STBY | Stop Managed Recovery via DG Broker"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        EDIT DATABASE '{{ db_unique_name_stby }}' SET STATE='APPLY-OFF';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      ignore_errors: yes
      when: needs_rollback

    - name: "STBY | Shutdown Standby Database"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SHUTDOWN IMMEDIATE;
        EOSQL
      become_user: "{{ oracle_user }}"
      ignore_errors: yes
      when: needs_rollback

    - name: "STBY | Wait 10 seconds for processes to terminate"
      pause:
        seconds: 10
      when: needs_rollback

    - name: "STBY | Kill remaining Oracle user processes"
      shell: "pkill -9 -u {{ oracle_user }} || true"
      when: needs_rollback

    # --- ROLLBACK OJVM ---
    - name: "STBY-OJVM | Rollback OJVM RU"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback -id {{ ojvm_patch_number }} -silent \
          2>&1 | tee /tmp/ojvm_rollback.log
      become_user: "{{ oracle_user }}"
      register: ojvm_rollback
      when: needs_rollback
      ignore_errors: yes

    - name: "STBY-OJVM | Show OJVM rollback result (last 10 lines)"
      debug:
        msg: "{{ ojvm_rollback.stdout_lines[-10:] }}"
      when: ojvm_rollback.stdout_lines is defined

    # --- ROLLBACK DB RU ---
    - name: "STBY-DB | Rollback DB RU"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback -id {{ db_patch_number }} -silent \
          2>&1 | tee /tmp/db_rollback.log
      become_user: "{{ oracle_user }}"
      register: db_rollback
      when: needs_rollback

    - name: "STBY-DB | Show DB rollback result (last 10 lines)"
      debug:
        msg: "{{ db_rollback.stdout_lines[-10:] }}"
      when: db_rollback.stdout_lines is defined

    # --- ROLLBACK GI ---
    - name: "STBY-GI | Rollback GI RU via opatchauto (takes ~15-30 min)"
      shell: |
        export PATH={{ grid_home }}/OPatch:$PATH
        {{ grid_home }}/OPatch/opatchauto rollback {{ patch_stage }}/{{ gi_patch_number }} \
          -oh {{ grid_home }} \
          2>&1 | tee /tmp/gi_rollback.log
      register: gi_rollback
      when: needs_rollback

    - name: "STBY-GI | Show GI rollback result (last 20 lines)"
      debug:
        msg: "{{ gi_rollback.stdout_lines[-20:] }}"
      when: gi_rollback.stdout_lines is defined

    # --- START STANDBY + MRP ---
    - name: "STBY | Start Standby Database (MOUNT)"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/srvctl start database -d {{ db_unique_name_stby }} -o mount
      become_user: "{{ oracle_user }}"
      when: needs_rollback

    - name: "STBY | Enable Managed Recovery via DG Broker"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        EDIT DATABASE '{{ db_unique_name_stby }}' SET STATE='APPLY-ON';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: needs_rollback

    - name: "STBY | Wait for redo apply to catch up (max 5 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW DATABASE '{{ db_unique_name_stby }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: stby_status
      until: "'apply lag' in stby_status.stdout | lower and 'SUCCESS' in stby_status.stdout"
      retries: 30
      delay: 10
      changed_when: false
      when: needs_rollback

    - name: "STBY | Verify patch level after rollback"
      shell: "{{ oracle_home }}/OPatch/opatch lspatches"
      become_user: "{{ oracle_user }}"
      register: stby_patches
      changed_when: false

    - name: "STBY | Show patches"
      debug:
        msg: "{{ stby_patches.stdout_lines }}"

# =========================================================================
# PLAY 3: SWITCHOVER (DATA GUARD ONLY)
# =========================================================================
- name: "ROLLBACK STEP 3: Switchover — Standby becomes Primary"
  hosts: primary
  become: yes

  tasks:
    - name: "SWITCHOVER | Check if Data Guard exists"
      set_fact:
        has_standby: "{{ groups['standby'] is defined and groups['standby'] | length > 0 }}"

    - name: "SWITCHOVER | Verify DG config is SUCCESS"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pre_switchover
      changed_when: false
      when: has_standby

    - name: "SWITCHOVER | Abort if configuration is not SUCCESS"
      fail:
        msg: "DG Configuration is not SUCCESS — switchover not safe."
      when: "has_standby and 'SUCCESS' not in pre_switchover.stdout"

    - name: "SWITCHOVER | Ensure MRP is running (APPLY-ON)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        EDIT DATABASE '{{ db_unique_name_stby }}' SET STATE='APPLY-ON';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: has_standby

    - name: "SWITCHOVER | Wait for Apply Lag = 0 (max 10 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW DATABASE '{{ db_unique_name_stby }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: stby_lag
      until: "'Apply Lag:      0 seconds' in stby_lag.stdout and 'SUCCESS' in stby_lag.stdout"
      retries: 60
      delay: 10
      changed_when: false
      when: has_standby

    - name: "SWITCHOVER | Execute switchover"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SWITCHOVER TO '{{ db_unique_name_stby }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: has_standby

    - name: "SWITCHOVER | Wait for switchover to complete (max 5 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchover_check
      until: "'SUCCESS' in switchover_check.stdout and db_unique_name_stby + ' - Primary' in switchover_check.stdout"
      retries: 30
      delay: 10
      changed_when: false
      when: has_standby

# =========================================================================
# PLAY 4: ROLLBACK PRIMARY (NOW STANDBY)
# =========================================================================
- name: "ROLLBACK STEP 4: Rollback Primary — new Primary stays online"
  hosts: primary
  become: yes

  tasks:
    - name: "PRI-CHECK | Check current patch level"
      shell: "{{ oracle_home }}/OPatch/opatch lspatches"
      become_user: "{{ oracle_user }}"
      register: current_patches
      changed_when: false

    - name: "PRI-CHECK | Skip rollback if patches not applied"
      set_fact:
        needs_rollback: "{{ db_patch_number in current_patches.stdout }}"
        has_standby: "{{ groups['standby'] is defined and groups['standby'] | length > 0 }}"

    # --- STOP MRP + DB ---
    - name: "PRI | Stop Managed Recovery via DG Broker"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        EDIT DATABASE '{{ db_unique_name_pri }}' SET STATE='APPLY-OFF';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      ignore_errors: yes
      when: needs_rollback and has_standby

    - name: "PRI | Shutdown Database"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SHUTDOWN IMMEDIATE;
        EOSQL
      become_user: "{{ oracle_user }}"
      ignore_errors: yes
      when: needs_rollback

    - name: "PRI | Wait 10 seconds for processes to terminate"
      pause:
        seconds: 10
      when: needs_rollback

    - name: "PRI | Kill remaining Oracle user processes"
      shell: "pkill -9 -u {{ oracle_user }} || true"
      when: needs_rollback

    # --- ROLLBACK OJVM ---
    - name: "PRI-OJVM | Rollback OJVM RU"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback -id {{ ojvm_patch_number }} -silent \
          2>&1 | tee /tmp/ojvm_rollback.log
      become_user: "{{ oracle_user }}"
      when: needs_rollback
      ignore_errors: yes

    # --- ROLLBACK DB RU ---
    - name: "PRI-DB | Rollback DB RU"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/OPatch/opatch rollback -id {{ db_patch_number }} -silent \
          2>&1 | tee /tmp/db_rollback.log
      become_user: "{{ oracle_user }}"
      when: needs_rollback

    # --- ROLLBACK GI ---
    - name: "PRI-GI | Rollback GI RU via opatchauto (takes ~15-30 min)"
      shell: |
        export PATH={{ grid_home }}/OPatch:$PATH
        {{ grid_home }}/OPatch/opatchauto rollback {{ patch_stage }}/{{ gi_patch_number }} \
          -oh {{ grid_home }} \
          2>&1 | tee /tmp/gi_rollback.log
      when: needs_rollback

    # --- START DB ---
    - name: "PRI | Start Database (MOUNT — Data Guard standby)"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/srvctl start database -d {{ db_unique_name_pri }} -o mount
      become_user: "{{ oracle_user }}"
      when: needs_rollback and has_standby

    - name: "PRI | Enable Managed Recovery"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        EDIT DATABASE '{{ db_unique_name_pri }}' SET STATE='APPLY-ON';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: needs_rollback and has_standby

    - name: "PRI | Wait for redo apply to catch up (max 5 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW DATABASE '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pri_status
      until: "'apply lag' in pri_status.stdout | lower and 'SUCCESS' in pri_status.stdout"
      retries: 30
      delay: 10
      changed_when: false
      when: needs_rollback and has_standby

    - name: "PRI | Start Database (OPEN — Standalone)"
      shell: |
        export ORACLE_HOME={{ grid_home }}
        {{ grid_home }}/bin/srvctl start database -d {{ db_unique_name_pri }}
      become_user: "{{ oracle_user }}"
      when: needs_rollback and not has_standby

    - name: "PRI | Verify patch level after rollback"
      shell: "{{ oracle_home }}/OPatch/opatch lspatches"
      become_user: "{{ oracle_user }}"
      register: pri_patches
      changed_when: false

    - name: "PRI | Show patches"
      debug:
        msg: "{{ pri_patches.stdout_lines }}"

# =========================================================================
# PLAY 5: SWITCHBACK (DATA GUARD ONLY)
# =========================================================================
- name: "ROLLBACK STEP 5: Switchover back — restore original roles"
  hosts: standby
  become: yes

  tasks:
    - name: "SWITCHBACK | Check if Data Guard exists"
      set_fact:
        has_standby: "{{ groups['standby'] is defined and groups['standby'] | length > 0 }}"

    - name: "SWITCHBACK | Verify DG config is SUCCESS"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pre_switchback
      changed_when: false
      when: has_standby

    - name: "SWITCHBACK | Abort if configuration is not SUCCESS"
      fail:
        msg: "DG Configuration is not SUCCESS — switchback not safe."
      when: "has_standby and 'SUCCESS' not in pre_switchback.stdout"

    - name: "SWITCHBACK | Ensure MRP is running (APPLY-ON)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        EDIT DATABASE '{{ db_unique_name_pri }}' SET STATE='APPLY-ON';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: has_standby

    - name: "SWITCHBACK | Wait for Apply Lag = 0 (max 10 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW DATABASE '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pri_lag
      until: "'Apply Lag:      0 seconds' in pri_lag.stdout and 'SUCCESS' in pri_lag.stdout"
      retries: 60
      delay: 10
      changed_when: false
      when: has_standby

    - name: "SWITCHBACK | Execute switchover back"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SWITCHOVER TO '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      when: has_standby

    - name: "SWITCHBACK | Wait for switchback to complete (max 5 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchback_check
      until: "'SUCCESS' in switchback_check.stdout and db_unique_name_pri + ' - Primary' in switchback_check.stdout"
      retries: 30
      delay: 10
      changed_when: false
      when: has_standby

# =========================================================================
# PLAY 6: DATAPATCH ROLLBACK ON PRIMARY
# =========================================================================
- name: "ROLLBACK STEP 6: Datapatch rollback on Primary"
  hosts: primary
  become: yes

  tasks:
    - name: "DATAPATCH | Ensure PDBs are open"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        ALTER PLUGGABLE DATABASE ALL OPEN;
        EOSQL
      become_user: "{{ oracle_user }}"

    - name: "DATAPATCH | Run datapatch to rollback SQL changes"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/OPatch/datapatch -verbose \
          2>&1 | tee /tmp/datapatch_rollback.log
      become_user: "{{ oracle_user }}"
      register: datapatch_result

    - name: "DATAPATCH | Show datapatch result (last 20 lines)"
      debug:
        msg: "{{ datapatch_result.stdout_lines[-20:] }}"

    - name: "DATAPATCH | Verify datapatch status"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        COL patch_id FORMAT 99999999
        COL action FORMAT A10
        COL status FORMAT A10
        COL description FORMAT A60
        SELECT patch_id, action, status, description
        FROM dba_registry_sqlpatch
        ORDER BY action_time;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: sqlpatch
      changed_when: false

    - name: "DATAPATCH | Show sqlpatch status"
      debug:
        msg: "{{ sqlpatch.stdout_lines }}"

# =========================================================================
# PLAY 7: CLEANUP
# =========================================================================
- name: "ROLLBACK STEP 7: Cleanup"
  hosts: oracle_servers
  become: yes

  tasks:
    - name: "CLEANUP | Remove patch staging directory"
      file:
        path: "{{ patch_stage }}"
        state: absent

    - name: "CLEANUP | Remove rollback log files"
      shell: "rm -f /tmp/gi_rollback.log /tmp/db_rollback.log /tmp/ojvm_rollback.log /tmp/datapatch_rollback.log"

    - name: "VALIDATE | Check final versions"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ oracle_sid }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF
        SELECT banner_full FROM v\$version WHERE ROWNUM=1;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: db_version
      changed_when: false

    - name: "VALIDATE | Check patches"
      shell: "{{ oracle_home }}/OPatch/opatch lspatches"
      become_user: "{{ oracle_user }}"
      register: patches
      changed_when: false

    - name: "VALIDATE | Show final status"
      debug:
        msg:
          - "=== {{ inventory_hostname }} ==="
          - "{{ db_version.stdout | trim }}"
          - "{{ patches.stdout_lines }}"
