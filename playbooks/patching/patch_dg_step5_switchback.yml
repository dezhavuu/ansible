---
# =============================================================================
# STEP 5: Switchover back — Restore original roles
# Works for: Data Guard only
# Ensures MRP is running and Apply Lag is 0 before switchover
# Variables from inventory: oracle_user, oracle_home, oracle_sid,
#   db_unique_name_pri, db_unique_name_stby
# Variables from vault: sys_password
# =============================================================================
- name: "STEP 5: Switchover back — restore original roles"
  hosts: standby
  become: yes

  tasks:
    # =========================================================================
    # PRE-SWITCHOVER CHECKS
    # =========================================================================
    - name: "PRE-CHECK | Verify DG config is SUCCESS"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pre_config
      changed_when: false

    - name: "PRE-CHECK | Show configuration"
      debug:
        msg: "{{ pre_config.stdout_lines }}"

    - name: "PRE-CHECK | Abort if configuration is not SUCCESS"
      fail:
        msg: "DG Configuration is not SUCCESS — switchback not safe. Fix manually before retrying."
      when: "'SUCCESS' not in pre_config.stdout"

    - name: "PRE-CHECK | Ensure MRP is running on new standby (APPLY-ON)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        EDIT DATABASE '{{ db_unique_name_pri }}' SET STATE='APPLY-ON';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"

    - name: "PRE-CHECK | Wait for Apply Lag = 0 and STATUS = SUCCESS (max 10 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SHOW DATABASE '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: pri_lag
      until: >
        (pri_lag.stdout | regex_search('Apply Lag:\s+0 seconds')) and
        ('SUCCESS' in pri_lag.stdout)
      retries: 60
      delay: 10
      changed_when: false

    - name: "PRE-CHECK | Verify switchover_status on standby (dghost-001)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s sys/{{ sys_password }}@{{ db_unique_name_pri }} as sysdba <<EOSQL
        SET HEADING OFF FEEDBACK OFF
        SELECT switchover_status FROM v\$database;
        EOSQL
      become_user: "{{ oracle_user }}"
      register: pri_switchover_status
      changed_when: false

    - name: "PRE-CHECK | Show switchover_status"
      debug:
        msg: "Standby (dghost-001) switchover_status: {{ pri_switchover_status.stdout | trim }}"

    - name: "PRE-CHECK | Abort if standby not ready for switchover"
      fail:
        msg: "Standby switchover_status is '{{ pri_switchover_status.stdout | trim }}' — expected 'TO PRIMARY' or 'NOT ALLOWED'."
      when: "'TO PRIMARY' not in pri_switchover_status.stdout and 'NOT ALLOWED' not in pri_switchover_status.stdout"

    # =========================================================================
    # EXECUTE SWITCHBACK
    # =========================================================================
    - name: "SWITCHBACK | Execute switchover back to original primary"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
        SWITCHOVER TO '{{ db_unique_name_pri }}';
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchback_result

    - name: "SWITCHBACK | Show switchback result"
      debug:
        msg: "{{ switchback_result.stdout_lines }}"

    # =========================================================================
    # POST-SWITCHOVER VALIDATION
    # =========================================================================
    - name: "POST-CHECK | Wait for switchback to complete (max 5 min)"
      shell: |
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
        SHOW CONFIGURATION;
        EXIT;
        EODG
      become_user: "{{ oracle_user }}"
      register: switchback_check
      until: >
        ('SUCCESS' in switchback_check.stdout) and
        (db_unique_name_pri + ' - Primary' in switchback_check.stdout)
      retries: 30
      delay: 10
      changed_when: false

    - name: "POST-CHECK | Switchback failed — retry with MRP fix"
      block:
        - name: "RETRY | Ensure MRP on new standby"
          shell: |
            export ORACLE_HOME={{ oracle_home }}
            {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
            EDIT DATABASE '{{ db_unique_name_stby }}' SET STATE='APPLY-ON';
            EXIT;
            EODG
          become_user: "{{ oracle_user }}"

        - name: "RETRY | Wait and retry switchback"
          shell: |
            export ORACLE_HOME={{ oracle_home }}
            {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_stby }} <<EODG
            SWITCHOVER TO '{{ db_unique_name_pri }}';
            EXIT;
            EODG
          become_user: "{{ oracle_user }}"

        - name: "RETRY | Wait for switchback to complete (max 5 min)"
          shell: |
            export ORACLE_HOME={{ oracle_home }}
            {{ oracle_home }}/bin/dgmgrl sys/{{ sys_password }}@{{ db_unique_name_pri }} <<EODG
            SHOW CONFIGURATION;
            EXIT;
            EODG
          become_user: "{{ oracle_user }}"
          register: retry_check
          until: >
            ('SUCCESS' in retry_check.stdout) and
            (db_unique_name_pri + ' - Primary' in retry_check.stdout)
          retries: 30
          delay: 10
          changed_when: false
      when: switchback_check is failed
      rescue:
        - name: "FATAL | Switchback failed after retry"
          fail:
            msg: "Switchback failed even after MRP fix. Manual intervention required."

    - name: "POST-CHECK | Show final status"
      debug:
        msg: "{{ switchback_check.stdout_lines }}"
      when: switchback_check is succeeded
